<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint board</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <input type="number" id="number">
        <input type="color" id="color">
        <input type="number" id="width" min="10" max="700" step="10" value="50">
        <input type="number" id="height" min="10" max="700" step="10" value="50">
        <button id="delete">Delete</button>
        <input type="checkbox" id="close">
        <label for="close">Presize</label>
    </header>
    <input type="checkbox" id="menu">
    <label for="menu">Close menu</label>
    <section></section>
    <script src="script.js"></script>
</body>

</html>
